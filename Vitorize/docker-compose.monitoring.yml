name: vitorize-monitoring

services:
  seq:
    image: datalust/seq:2025.2
    container_name: vitorize-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINUSERNAME: "admin"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: "${SEQ_FIRSTRUN_ADMINPASSWORDHASH:?Set a strong Seq first-run admin password hash}"
    volumes:
      - seq-data:/data
    ports:
      - "127.0.0.1:${SEQ_INGEST_PORT:-5341}:5341"
      - "127.0.0.1:${SEQ_UI_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - monitoring

volumes:
  seq-data:

networks:
  monitoring:
    internal: true
